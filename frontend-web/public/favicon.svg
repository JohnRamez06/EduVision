<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle with brand gradient -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Graduation cap (simplified) -->
  <!-- Diamond/mortarboard top -->
  <polygon points="16,7 26,12 16,17 6,12" fill="white" opacity="0.95"/>
  <!-- Cap base line -->
  <rect x="6" y="12" width="20" height="2" rx="1" fill="white" opacity="0.3"/>
  <!-- Left tassel string -->
  <line x1="6" y1="13" x2="6" y2="20" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Tassel bob -->
  <circle cx="6" cy="21.5" r="1.5" fill="white" opacity="0.85"/>
  <!-- Right side body of cap (the cylinder under) -->
  <path d="M20 14.5 L20 21 Q16 23 12 21 L12 14.5" fill="white" opacity="0.7"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>
</svg>
