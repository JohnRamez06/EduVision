spring:
  datasource:
    url: jdbc:mysql://localhost:3306/eduvision?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
server:
  port: 8080
eduvision:
  ai-service:
    url: http://localhost:8000
  r-service:
    url: http://localhost:8001
  jwt:
    secret: eduvision-secret-change-in-production
    expiration: 86400000