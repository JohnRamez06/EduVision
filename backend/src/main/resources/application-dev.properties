spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/eduvision?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8080
eduvision.ai-service.url=http://localhost:8000
eduvision.r-service.url=http://localhost:8001
eduvision.jwt.secret=eduvision-secret-change-in-production
eduvision.jwt.expiration=86400000
