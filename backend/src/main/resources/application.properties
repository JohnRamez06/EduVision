# ── Request / upload size limits ─────────────────────────────────────────────
# Raise limits so JSON bodies carrying base64 images are accepted
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:8889/eduvision?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8080
server.error.include-message=always
server.error.include-stacktrace=on-param
server.error.include-binding-errors=always
logging.level.com.eduvision=DEBUG
eduvision.ai-service.url=http://localhost:8000
eduvision.r-service.url=http://localhost:8001
eduvision.jwt.secret=eduvision-secret-change-in-production
eduvision.jwt.expiration=86400000