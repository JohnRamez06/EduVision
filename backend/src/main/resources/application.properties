spring.datasource.url=jdbc:mysql://localhost:3306/eduvision?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8080
eduvision.ai-service.url=http://localhost:8000
eduvision.r-service.url=http://localhost:8001
eduvision.jwt.secret=eduvision-secret-change-in-production
eduvision.jwt.expiration=86400000
# Path to the analytics-r directory (absolute or relative to working directory).
eduvision.analytics.base-path=${ANALYTICS_HOME:analytics-r}
eduvision.rscript.command=${RSCRIPT_CMD:Rscript}
